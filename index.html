<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Book Pipeline Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0F172A',
                        cardbg: '#1E293B',
                        bordercolor: '#334155'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkbg text-slate-100 font-sans min-h-screen p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header & Controls -->
        <header class="bg-cardbg rounded-xl border border-bordercolor shadow-lg overflow-hidden">
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-wide">L2 Order Book Dashboard</h1>
                    <p class="text-xs text-slate-400 mt-1">Real-time WebSocket Ingestion & Microstructure Metrics</p>
                </div>
                
                <div class="flex items-center space-x-3">
                    <label for="assetSelect" class="text-sm font-medium text-slate-300">Select Asset:</label>
                    <select id="assetSelect" onchange="fetchData()" class="bg-slate-900 border border-bordercolor text-slate-200 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none">
                        <option value="BTC/USD">BTC/USD</option>
                        <option value="ETH/USD">ETH/USD</option>
                        <option value="SOL/USD">SOL/USD</option>
                        <option value="AVAX/USD">AVAX/USD</option>
                    </select>
                </div>
            </div>
            
            <!-- Navigation Bar -->
            <nav class="bg-slate-900/50 border-t border-bordercolor px-6 py-3 flex space-x-6 text-sm">
                <!-- ACTIVE TAB -->
                <a href="/" class="text-blue-400 font-semibold border-b-2 border-blue-400 pb-1">Live Feed</a>
                
                <!-- INACTIVE TABS -->
                <a href="/charts" class="text-slate-400 hover:text-slate-200 transition-colors pb-1">Historical Charts (1m Rollups)</a>
                <a href="https://github.com/allenwang6/Order-Book" target="_blank" class="text-slate-400 hover:text-slate-200 transition-colors pb-1 flex items-center gap-1">
                    Source Code
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
            </nav>
        </header>

        <!-- Real-Time Metrics Cards -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-cardbg p-5 rounded-xl border border-bordercolor">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Mid Price</span>
                <div id="midPrice" class="text-2xl font-extrabold text-blue-400 mt-2">--</div>
            </div>

            <div class="bg-cardbg p-5 rounded-xl border border-bordercolor">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Micro Price</span>
                <div id="microPrice" class="text-2xl font-extrabold text-purple-400 mt-2">--</div>
            </div>

            <div class="bg-cardbg p-5 rounded-xl border border-bordercolor">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Bid-Ask Spread</span>
                <div id="spread" class="text-2xl font-extrabold text-emerald-400 mt-2">--</div>
            </div>

            <div class="bg-cardbg p-5 rounded-xl border border-bordercolor">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Imbalance (OBI)</span>
                <div id="imbalance" class="text-2xl font-extrabold text-amber-400 mt-2">--</div>
            </div>
        </section>

        <!-- Live Feed Table -->
        <section class="bg-cardbg rounded-xl border border-bordercolor overflow-hidden shadow-lg">
            <div class="p-4 border-b border-bordercolor flex justify-between items-center">
                <h2 class="text-base font-semibold text-slate-200">Recent High-Frequency Ticks</h2>
                <span class="flex h-2.5 w-2.5 relative">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-300">
                    <thead class="text-xs uppercase bg-slate-900/60 text-slate-400 border-b border-bordercolor">
                        <tr>
                            <th class="px-6 py-3">Timestamp</th>
                            <th class="px-6 py-3">Best Bid</th>
                            <th class="px-6 py-3">Best Ask</th>
                            <th class="px-6 py-3">Spread</th>
                            <th class="px-6 py-3">Micro Price</th>
                            <th class="px-6 py-3">OBI</th>
                        </tr>
                    </thead>
                    <tbody id="ticksTableBody">
                        <!-- Ticks populated dynamically -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Run immediately when page loads
        document.addEventListener("DOMContentLoaded", () => {
            const savedAsset = localStorage.getItem('selectedAsset');
            if (savedAsset) {
                document.getElementById('assetSelect').value = savedAsset;
            }
            fetchData();
            setInterval(fetchData, 1000);
        });

        async function fetchData() {
            const selectEl = document.getElementById('assetSelect');
            const symbol = selectEl.value;
            
            // Save the selection to Local Storage
            localStorage.setItem('selectedAsset', symbol);

            try {
                const response = await fetch(`/api/metrics/latest?symbol=${encodeURIComponent(symbol)}&limit=15`);
                const result = await response.json();
                
                if (!result.data || result.data.length === 0) return;

                const latest = result.data[0];

                document.getElementById('midPrice').innerText = `$${parseFloat(latest.mid_price).toFixed(2)}`;
                document.getElementById('microPrice').innerText = `$${parseFloat(latest.micro_price).toFixed(2)}`;
                document.getElementById('spread').innerText = `$${parseFloat(latest.spread).toFixed(4)}`;
                
                const obiVal = parseFloat(latest.imbalance);
                const obiElem = document.getElementById('imbalance');
                obiElem.innerText = `${obiVal >= 0 ? '+' : ''}${obiVal.toFixed(3)}`;
                obiElem.className = `text-2xl font-extrabold mt-2 ${obiVal >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

                const tbody = document.getElementById('ticksTableBody');
                tbody.innerHTML = '';
                
                result.data.forEach(row => {
                    const time = new Date(row.timestamp).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-bordercolor/50 hover:bg-slate-800/40 transition-colors';
                    tr.innerHTML = `
                        <td class="px-6 py-3 font-mono text-xs text-slate-400">${time}</td>
                        <td class="px-6 py-3 text-emerald-400 font-mono">$${parseFloat(row.best_bid).toFixed(2)}</td>
                        <td class="px-6 py-3 text-rose-400 font-mono">$${parseFloat(row.best_ask).toFixed(2)}</td>
                        <td class="px-6 py-3 font-mono">$${parseFloat(row.spread).toFixed(2)}</td>
                        <td class="px-6 py-3 font-mono text-purple-300">$${parseFloat(row.micro_price).toFixed(2)}</td>
                        <td class="px-6 py-3 font-mono ${parseFloat(row.imbalance) >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${parseFloat(row.imbalance) >= 0 ? '+' : ''}${parseFloat(row.imbalance).toFixed(3)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to fetch dashboard metrics:", err);
            }
        }
    </script>
</body>
</html>
